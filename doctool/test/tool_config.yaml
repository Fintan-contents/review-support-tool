xlsm_name: "Excel設計書レビュー指摘事項抽出ツール.xlsm"

# テストアダプタ設定（汎用テストエンジンがツール固有処理をアダプタ経由で呼び出す）
adapter:
  module: "adapters.doctool_adapter"
  class: "DoctoolAdapter"
