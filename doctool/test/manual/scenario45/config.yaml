mode: manual
viewpoint: "観点82-B: C01「いいえ」選択時に処理が中断され結果シートが生成されない"
instructions:
- "【事前準備】レビュー記録サマリ_S44.xlsx を Excel で開き、任意のセルを編集して未保存状態にする"
- "【事前準備】設計書・レビュー記録票も開く（合計3ファイルが開いた状態）"
- "抽出ボタンを押すと C01 ダイアログが表示されることを確認"
- "「いいえ」を選択すると処理が中断されることを確認"
- "I01 が表示されないことを確認"
- "設計書に「レビュー結果1回目」シートが生成されていないことを確認"

setup:
  use_review_record: true
  use_summary: true

steps:
- action: extract
  review_times: 1
  categories:
  - alias: a
    name: 分類001_a
  - alias: b
    name: 分類002_b
  - alias: c
    name: 分類003_c

# C01 は「サマリが開かれかつ未保存」の場合のみ発火するため手動テスト
# パターン B: C01「いいえ」→ 処理中断（I01 非表示・結果シート非生成）
