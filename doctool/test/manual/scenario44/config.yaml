mode: manual
viewpoint: "観点82: C01 クローズ確認ダイアログ（レビュー記録一覧が未保存で開かれている場合）"
instructions:
- "【事前準備】レビュー記録サマリ_S44.xlsx を Excel で開き、任意のセルを編集して未保存状態にする"
- "【事前準備】設計書・レビュー記録票も開く（合計3ファイルが開いた状態）"
- "【A: はい】抽出ボタンを押すと C01 ダイアログが表示されることを確認"
- "【A: はい】「はい」を選択すると、サマリが保存・再オープンされてから処理続行 → C02 → I01 が表示されることを確認"
- "【B: いいえ】再び事前準備を実施し、抽出ボタンを押して C01 ダイアログが表示されたら「いいえ」を選択"
- "【B: いいえ】処理が中断され I01 は表示されないことを確認"
- "【B: いいえ】設計書に「レビュー結果1回目」シートが生成されていないことを確認"

setup:
  use_review_record: true
  use_summary: true

steps:
- action: extract
  review_times: 1
  categories:
  - alias: a
    name: 分類001_a
  - alias: b
    name: 分類002_b
  - alias: c
    name: 分類003_c

# C01 は「サマリが開かれかつ未保存」の場合のみ発火するため手動テスト
# テストパターン:
#   A: C01「はい」→ 処理続行（期待メッセージ: C01, C02, I01）
#   B: C01「いいえ」→ 処理中断（期待メッセージ: C01 のみ）
