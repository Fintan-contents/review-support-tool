mode: manual
viewpoint: "観点82-A: C01「はい」選択時に処理が続行されレビュー記録一覧が正常に更新される"
instructions:
- "【事前準備】レビュー記録サマリ_S44.xlsx を Excel で開き、任意のセルを編集して未保存状態にする"
- "【事前準備】設計書・レビュー記録票も開く（合計3ファイルが開いた状態）"
- "抽出ボタンを押すと C01 ダイアログが表示されることを確認"
- "「はい」を選択すると、サマリが保存・再オープンされてから処理続行 → C02 → I01 が表示されることを確認"
- "設計書に「レビュー結果1回目」シートが生成されていることを確認"

setup:
  use_review_record: true
  use_summary: true

steps:
- action: extract
  review_times: 1
  categories:
  - alias: a
    name: 分類001_a
  - alias: b
    name: 分類002_b
  - alias: c
    name: 分類003_c

# C01 は「サマリが開かれかつ未保存」の場合のみ発火するため手動テスト
# パターン A: C01「はい」→ 処理続行（期待メッセージ: C01, C02, I01）
