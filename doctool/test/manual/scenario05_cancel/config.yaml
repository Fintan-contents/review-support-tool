# scenario05_cancel: 抽出前確認ダイアログ「キャンセル」
# 観点: 18

mode: manual
viewpoint: "観点18: 抽出前確認ダイアログ「キャンセル」で以降の全ファイルをスキップ"
instructions:
  - "Excelが起動したら、ファイルAのダイアログが表示されます"
  - "ファイルA（サンプルA_S05）に対して「キャンセル」をクリック"
  - "「以降の処理を中止します。」メッセージが表示されることを確認して「OK」をクリック"
  - "処理がそこで終了し、ファイルBのダイアログは表示されないことを確認"

steps:
  - action: extract
    review_times: 1

# ファイルごとの期待状態
# キャンセルにより全ファイルがスキップされる
file_expectations:
  - pattern: "サンプルA"
    assert_no_sheets:
      - "レビュー結果1回目"
  - pattern: "サンプルB"
    assert_no_sheets:
      - "レビュー結果1回目"
