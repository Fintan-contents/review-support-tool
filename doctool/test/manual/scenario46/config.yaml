mode: manual
viewpoint: "観点83: エラー後の画面状態が CleanupOnError によって正常に復旧される"
instructions:
- "【事前準備】設計書・記録票を開いた状態で use_summary=true、ファイルパスを空欄に設定する"
- "抽出ボタンを押すと E01 エラーが表示されることを確認"
- "E01 ダイアログを閉じた後、以下を確認する:"
- "  1. Excel の画面が正常に表示されている（ScreenUpdating=True の確認）"
- "  2. マウスカーソルが通常の矢印カーソルに戻っている（Cursor=xlDefault の確認）"
- "  3. Excel のステータスバーに「準備完了」等の通常表示が出ている（StatusBar=False の確認）"
- "次に E04（存在しないファイルパスを指定）や E07（回数順序不正）でも同様に確認する"
- "すべてのエラーケースで画面状態が正常に復旧することを確認"

setup:
  use_review_record: true
  use_summary: true

steps:
- action: extract
  review_times: 1
  categories:
  - alias: a
    name: 分類001_a
  - alias: b
    name: 分類002_b
  - alias: c
    name: 分類003_c

# CleanupOnError は VBA の On Error GoTo ERROR → CleanupOnError() で呼ばれる
# テストする状態:
#   - Application.ScreenUpdating = True
#   - Application.Cursor = xlDefault
#   - Application.StatusBar = False
# 自動テストでは Excel 起動ごとに新プロセスが使われるため目視確認が必要
