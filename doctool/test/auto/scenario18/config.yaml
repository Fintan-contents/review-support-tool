viewpoint: "観点66: レビュー記録票に転記先シートが存在しない場合（E06）でエラーになり処理中断する"
instructions:
  - "項目マッピング設定シートの B2（ヘッダーシート名）を存在しないシート名に書き換える"
  - "E06 はファイル処理ループ内・結果シート作成前に発火する"
  - "C02（抽出前確認）は出現するが I01（完了通知）は出現しない"
  - "検証: E06 がログに記録され、設計書に結果シートが生成されないこと"

# item_mapping_cells: 項目マッピング設定シートのセルを直接書き換える
# B2 = ヘッダーシート名（レビュー記録票内のシート名）
# "存在しないシート" にすることで hasSheet(recordTicket, B2) が False → E06
setup:
  item_mapping_cells:
    B2: "存在しないシート"

steps:
  - action: extract
    review_times: 1

expected_messages:
  - "C02"
  - "E06"

file_expectations:
  - pattern: "システム機能設計書_サンプル_S18\\.xlsx"
    assert_no_sheets: ["レビュー結果1回目"]
