viewpoint: '観点80: 3カテゴリ（a-c）設定で指摘ゼロの場合、REVIEW_RESULT値"合格"が正しい列（DETAIL_COL_LIST_CATEGORY_A + 3 = 列32）に書き込まれる'
instructions:
- 3カテゴリ設定（a-c）+ コメントなし設計書 + レビュー記録サマリ使用
- '検証: 指摘合計=0 により reviewResult="合格" が生成されること'
- '検証: "合格"が DETAIL_COL_LIST_CATEGORY_A + 3 の列（列32）に書き込まれること'
- '検証: 9未満のカテゴリ数でも動的計算式が正しく機能することを確認'
- Gold Master は VBA ビルド後に Windows 環境で作成

setup:
  use_review_record: true
  use_summary: true
  review_list_file: レビュー記録サマリ_S42.xlsx
skip_open_files:
- レビュー記録サマリ.*\.xlsx
steps:
- action: extract
  review_times: 1
  categories:
  - alias: a
    name: 分類001_a
  - alias: b
    name: 分類002_b
  - alias: c
    name: 分類003_c
expected_messages:
- C02
- I01
