viewpoint: '観点85: 複数の設計書を同時に開いて抽出した場合、レビュー記録一覧に複数行（各設計書1行）が正しく追加される'
instructions:
- 設計書A（a:1件未済、c:1件未済）+ 設計書B（b:1件未済）を同時に開いて抽出
- レビュー記録一覧に2行が追加され、各行のカテゴリ件数が正しいことを Gold Master で検証
- Gold Master は VBA ビルド後に Windows 環境で作成

setup:
  use_review_record: true
  use_summary: true
  review_list_file: レビュー記録サマリ_S47.xlsx
skip_open_files:
- レビュー記録サマリ.*\.xlsx
steps:
- action: extract
  review_times: 1
  categories:
  - alias: a
    name: 分類001_a
  - alias: b
    name: 分類002_b
  - alias: c
    name: 分類003_c
expected_messages:
- C02
- I01
