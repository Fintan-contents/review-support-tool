viewpoint: '観点78: エイリアスに重複がある場合 E14 エラーが発生し処理が中断される'
instructions:
  - 'エイリアス "a" を2行設定してカテゴリ重複状態を作る'
  - '検証: E14 エラーメッセージが表示されて処理が中断されること'

setup:
  use_review_record: false
  use_summary: false

steps:
  - action: extract
    review_times: 1
    categories:
      - alias: a
        name: 分類001_a
      - alias: b
        name: 分類002_b
      - alias: a
        name: 分類003_a_重複

expected_messages:
  - "E14"

file_expectations:
  - pattern: "システム機能設計書_サンプル_S38\\.xlsx"
    assert_no_sheets: ["レビュー結果1回目"]
