viewpoint: "観点65: カテゴリ増設定（9→12）でレビュー記録サマリ使用時、レビュー記録一覧のカテゴリヘッダーが正しく増設される"
instructions:
  - "12カテゴリ設定 + レビュー記録サマリ使用 で抽出実行"
  - "検証: レビュー記録一覧のカテゴリヘッダーが12列に増設されること"
  - "template_assertions でテンプレートシートのカテゴリ列数（12）を自動検証（Gold Master pending）"
  - "Gold Master（_expected.xlsx）は修正後 Windows 実行後に作成"

# categories は step レベルで指定する（setup レベルでは VBA が正しく読まないケースがある）
setup:
  use_summary: true
  review_list_file: "レビュー記録サマリ_S29.xlsx"

# VBA が REVIEW_LIST_FILEPATH 経由でファイルを開くため Python では開かない
# （Python が先に開くと wb.save() で VBA の書き込み結果が上書きされる）
skip_open_files:
  - "レビュー記録サマリ.*\\.xlsx"

steps:
  - action: extract
    review_times: 1
    categories:
      - alias: "a"
        name: "01_要件漏れ"
      - alias: "b"
        name: "02_要件誤り"
      - alias: "c"
        name: "11_機能・仕様漏れ"
      - alias: "d"
        name: "12_機能・仕様誤り"
      - alias: "e"
        name: "21_設計・ドキュメント規約違反"
      - alias: "f"
        name: "22_記述誤り"
      - alias: "g"
        name: "91_疑問点、確認"
      - alias: "h"
        name: "92_改善要望"
      - alias: "i"
        name: "93_仕様変更"
      - alias: "j"
        name: "94_テスト項目漏れ"
      - alias: "k"
        name: "95_テスト漏れ"
      - alias: "l"
        name: "96_その他"

expected_messages:
  - "C02"
  - "I01"

template_assertions:
  - sheet: "レビュー結果シートテンプレート"
    category_count: 12
