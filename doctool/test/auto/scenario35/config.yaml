viewpoint: "観点70: 全52カテゴリ設定（a～z, aa～zz）でレビュー記録サマリ・レビュー記録票使用時、全カテゴリのコメントが正しく抽出される"
instructions:
  - "52カテゴリ設定 + レビュー記録サマリ使用 + レビュー記録票使用 で抽出実行"
  - "検証: 全52カテゴリ（a～z, aa～zz）のコメントが正しく抽出されること"
  - "Gold Master 比較で抽出出力の内容を検証"

# categories は step レベルで指定する（setup レベルでは VBA が正しく読まないケースがある）
setup:
  use_review_record: true
  use_summary: true
  review_list_file: "レビュー記録サマリ_S35.xlsx"

# VBA が REVIEW_LIST_FILEPATH 経由でファイルを開くため Python では開かない
# （Python が先に開くと wb.save() で VBA の書き込み結果が上書きされる）
skip_open_files:
  - "レビュー記録サマリ.*\\.xlsx"

steps:
  - action: extract
    review_times: 1
    categories:
      - alias: "a"
        name: "01_要件漏れ"
