viewpoint: "観点31〜35,39〜42: カテゴリ減（9→6）でテンプレート列削減と抽出が正しく動作する"
instructions:
  - "入力: 6カテゴリ（a〜f）設定、各カテゴリに1件ずつコメントを配置した設計書"
  - "setup.categories で xlsm を 6 カテゴリに変更してから抽出実行"
  - "検証: テンプレートが 6 列に削減され、全カテゴリの指摘が正しく集計されること"
  - "template_assertions でカテゴリ列数（6）を自動検証"
  - "Gold Master 比較で抽出出力の内容を検証"

setup:
  categories:
    - alias: "a"
      name: "01_要件漏れ"
    - alias: "b"
      name: "02_要件誤り"
    - alias: "c"
      name: "11_機能・仕様漏れ"
    - alias: "d"
      name: "12_機能・仕様誤り"
    - alias: "e"
      name: "21_設計・ドキュメント規約違反"
    - alias: "f"
      name: "22_記述誤り"

steps:
  - action: extract
    review_times: 1

template_assertions:
  - sheet: "レビュー結果シートテンプレート"
    category_count: 6

excluded_cells:
  - sheet: "レビュー結果1回目"
    cells: ["E4"]
