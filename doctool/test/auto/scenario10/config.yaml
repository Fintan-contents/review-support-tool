# scenario10: 削除機能
# 観点:
#   26: コメント削除ボタンで全レビューコメントが削除される
#   27: レビュー結果シート削除ボタンで全レビュー結果シートが削除される
#   28: 削除対象なしで通知メッセージが表示される

steps:
  - action: extract
    review_times: 1
  - action: delete_comments
  - action: delete_sheets

# 削除後にシートが存在しないことを確認
file_expectations:
  - pattern: ".*機能設計書.*"
    assert_no_sheets:
      - "レビュー結果1回目"
  - pattern: ".*レビュー記録票.*"
    assert_no_sheets: []  # 削除後の記録票は Gold Master 比較不要
