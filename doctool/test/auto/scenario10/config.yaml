viewpoint: "観点26-28: 削除機能（コメント削除・シート削除・削除対象なし通知）"
instructions:
  - "入力: S01 と同内容"
  - "REVIEW_TIMES=1 で抽出実行 → コメント削除 → シート削除 の順に実行"
  - "検証: Gold Master 比較で削除後の設計書（レビュー結果シートなし・レビューコメントなし・カテゴリなしコメント残存）と記録票の内容を確認"

steps:
  - action: extract
    review_times: 1
  - action: delete_comments
  - action: delete_sheets

# Gold Master 比較で以下を一括検証:
#   設計書: レビュー結果シートが削除されていること、レビューコメント(*,a-c)が削除されていること、
#           カテゴリなしコメント(A71)が残存していること
#   記録票: extract 後の転記内容が正しく、シートが意図せず削除されていないこと
