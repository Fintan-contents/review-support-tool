viewpoint: "観点26-28: 削除機能（コメント削除・シート削除・削除対象なし通知）"
instructions:
  - "入力: S01 と同内容"
  - "REVIEW_TIMES=1 で抽出実行 → コメント削除 → シート削除 の順に実行"
  - "検証: 削除後にレビューコメントとレビュー結果シートが存在しないことを assert_no_sheets で確認"

steps:
  - action: extract
    review_times: 1
  - action: delete_comments
  - action: delete_sheets

file_expectations:
  - pattern: ".*機能設計書.*"
    assert_no_sheets:
      - "レビュー結果1回目"
  - pattern: ".*レビュー記録票.*"
    assert_no_sheets: []  # 削除後の記録票は Gold Master 比較不要
