# scenario01: 基本抽出（正常系）
# 観点:
#   01: 日時コメント（`*`）が正しく解析される（実施日・開始・終了・レビュー時間）
#   02: 指摘コメントが正しく解析される（指摘者・カテゴリ・指摘内容）
#   03: 結果シートの指摘詳細（E列）には`---`区切りを含む全量が書き込まれる
#   04: 記録票の指摘一覧では`---`で分割され、H列（指摘項目・問題点）とJ列（処置・対策）に分かれて書き込まれる
#   05: 末尾「済」で対応済みフラグが設定される
#   07: カテゴリなしコメント（`名前:`のみ）がスキップされる
#   09: 初回実行でレビュー結果シートが生成される
#   10: ヘッダー部が正しく書き込まれる（ファイル名・レビュー回数・実施日時）
#   11: カテゴリエイリアス行（7行目）にカテゴリエイリアス（a, b, c, ...）が書き込まれる
#   12: カテゴリ名行（8行目）に指摘分類名が書き込まれる
#   13: 対応済件数（9行目）がカテゴリ別に正しく集計される
#   14: 未済件数（10行目）がカテゴリ別に正しく集計される
#   15: 指摘詳細が正しく書き込まれる（シート・場所・指摘者・種別・内容・対応状況）
#   16: ヘッダー情報がレビュー記録票に正しく転記される
#   17: 指摘一覧がレビュー記録票に正しく転記される
#   19: 処理対象パターンにマッチするファイルが処理される
#   20: 処理対象外パターンにマッチするファイルが除外される

steps:
  - action: extract
    review_times: 1
