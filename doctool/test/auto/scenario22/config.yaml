viewpoint: "観点72: 作成者・レビュイを設計書から取得できない場合（W04）に警告して「取得できませんでした」をセットし処理続行する"
instructions:
  - "REVIEW_LIST_REVIEWEE_SHEET に存在しないシート名を設定し、checkReference を失敗させる"
  - "W04 は結果シート作成後に発火 → 処理は続行し I01 が出力される"
  - "検証: W04 がログに記録され、結果シートが正しく生成されること"
  - "検証: 結果シートのレビュイ欄に '取得できませんでした' が記載されること（Gold Master 比較で確認）"

# REVIEW_LIST_REVIEWEE: 固定値を空にする
# REVIEW_LIST_REVIEWEE_SHEET: 存在しないシート名 → checkReference 失敗 → W04
setup:
  named_ranges:
    REVIEW_LIST_REVIEWEE: ""
    REVIEW_LIST_REVIEWEE_SHEET: "存在しないシート"
    REVIEW_LIST_REVIEWEE_CELL: "B1"

steps:
  - action: extract
    review_times: 1

expected_messages:
  - "C02"
  - "W04"
  - "I01"
