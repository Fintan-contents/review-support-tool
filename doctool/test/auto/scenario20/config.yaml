viewpoint: "観点68: 対象パターンにマッチする設計書が開いていない場合（E08）で通知して処理中断する"
instructions:
  - "skip_open_files で全 xlsx を Excel で開かないようにする"
  - "VBA は対象ファイルを見つけられず E08 で通知・中断する"
  - "検証: E08 メッセージがログに記録され、設計書に結果シートが生成されないこと"

setup:
  use_review_record: false
  use_summary: false

# 全 xlsx ファイルを Excel で開かない（設計書0件 → E08）
skip_open_files:
  - ".*\\.xlsx"

steps:
  - action: extract
    review_times: 1

expected_messages:
  - "E08"

file_expectations:
  - pattern: "システム機能設計書_サンプル_S20\\.xlsx"
    assert_no_sheets: ["レビュー結果1回目"]
