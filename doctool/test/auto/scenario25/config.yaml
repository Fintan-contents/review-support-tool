viewpoint: "観点30,32〜36,38,43: カテゴリ増（9→12）でテンプレート列調整と抽出が正しく動作する"
instructions:
  - "入力: 12カテゴリ（a〜l）設定、各カテゴリに1件ずつコメントを配置した設計書"
  - "setup.categories で xlsm を 12 カテゴリに上書きしてから抽出実行"
  - "検証: テンプレートが 12 列に拡張され、全カテゴリの指摘が正しく集計されること"
  - "template_assertions でカテゴリ列数（12）を自動検証"
  - "Gold Master 比較で抽出出力の内容を検証"

setup:
  categories:
    - alias: "a"
      name: "01_要件漏れ"
    - alias: "b"
      name: "02_要件誤り"
    - alias: "c"
      name: "11_機能・仕様漏れ"
    - alias: "d"
      name: "12_機能・仕様誤り"
    - alias: "e"
      name: "21_設計・ドキュメント規約違反"
    - alias: "f"
      name: "22_記述誤り"
    - alias: "g"
      name: "91_疑問点、確認"
    - alias: "h"
      name: "92_改善要望"
    - alias: "i"
      name: "93_仕様変更"
    - alias: "j"
      name: "94_テスト項目漏れ"
    - alias: "k"
      name: "95_テスト漏れ"
    - alias: "l"
      name: "96_その他"

steps:
  - action: extract
    review_times: 1

expected_messages:
  - "C02"
  - "I01"
