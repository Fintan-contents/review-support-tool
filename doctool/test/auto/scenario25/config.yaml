viewpoint: "観点71: レビュアを設計書から取得できない場合（W03）に警告して「取得できませんでした」をセットし処理続行する"
instructions:
  - "REVIEW_LIST_REVIEWER_SHEET に存在しないシート名を設定し、checkReference を失敗させる"
  - "W03 は結果シート作成後に発火 → 処理は続行し I01 が出力される"
  - "検証: W03 がログに記録され、結果シートが正しく生成されること"

# REVIEW_LIST_REVIEWER: 固定値を空にする
# REVIEW_LIST_REVIEWER_SHEET: 存在しないシート名 → checkReference 失敗 → W03
setup:
  named_ranges:
    REVIEW_LIST_REVIEWER: ""
    REVIEW_LIST_REVIEWER_SHEET: "存在しないシート"
    REVIEW_LIST_REVIEWER_CELL: "B1"

steps:
  - action: extract
    review_times: 1

expected_messages:
  - "C02"
  - "W03"
  - "I01"

template_assertions:
  - sheet: "レビュー結果シートテンプレート"
    category_count: 9
