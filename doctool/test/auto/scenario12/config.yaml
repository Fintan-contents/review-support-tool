viewpoint: "観点29: レビュー記録サマリ使用時、日時・回数等がレビュー記録一覧に正しく転記される"
instructions:
  - "入力: S01 と同内容（レビュー記録サマリ使用=TRUE）"
  - "REVIEW_TIMES=1 で抽出実行"
  - "検証: レビュー記録一覧にレビュー回数・日付・開始/終了時刻・レビュー時間等が転記されることを Gold Master 比較で確認"

# レビュー記録サマリ（B3）を有効化し、
# REVIEW_LIST_FILEPATH を work_dir 内ファイルの絶対パスで動的設定する
setup:
  use_summary: true
  review_list_file: "レビュー記録サマリ_S12.xlsx"

steps:
  - action: extract
    review_times: 1

expected_messages:
  - "C02"
  - "I01"
