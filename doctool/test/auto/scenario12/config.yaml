viewpoint: "観点61: レビュー記録サマリ使用時にファイルパス未入力（E01）でエラーになり処理中断する"
instructions:
  - "use_summary=true の状態で REVIEW_LIST_FILEPATH を空文字に設定"
  - "E01 はファイルループ前（設定バリデーション段階）に発火する"
  - "検証: E01 がログに記録され、C02・I01 は出現せず、設計書に結果シートが生成されないこと"

# use_summary=true + REVIEW_LIST_FILEPATH="" → E01
setup:
  use_summary: true
  named_ranges:
    REVIEW_LIST_FILEPATH: ""

steps:
  - action: extract
    review_times: 1

expected_messages:
  - "E01"

file_expectations:
  - pattern: "システム機能設計書_サンプル_S12\\.xlsx"
    assert_no_sheets: ["レビュー結果1回目"]
