viewpoint: "観点64: レビュー記録一覧ファイルが存在しない場合（E04）でエラーになり処理中断する"
instructions:
  - "存在しないファイル名を review_list_file に指定する"
  - "scenario_runner.py が work_dir 内の絶対パスを REVIEW_LIST_FILEPATH に設定するが、"
  - "そのファイルは work_dir に存在しないため Dir() チェックが失敗し E04 が発火する"
  - "検証: E04 がログに記録され、設計書に結果シートが生成されないこと"

# review_list_file に存在しないファイル名を指定 → FILEPATH がセットされるが
# そのファイルが work_dir に存在しないため E04 発火
# （E03 発火を回避するため REVIEW_LIST_SHEET は xlsm デフォルト値を維持する）
setup:
  use_summary: true
  review_list_file: "存在しないファイル.xlsx"

steps:
  - action: extract
    review_times: 1

expected_messages:
  - "E04"

file_expectations:
  - pattern: "システム機能設計書_サンプル_S16\\.xlsx"
    assert_no_sheets: ["レビュー結果1回目"]
