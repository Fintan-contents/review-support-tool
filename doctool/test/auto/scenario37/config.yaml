viewpoint: '観点76/77: 12カテゴリ（a-l）設定でエイリアス"j"のコメントがある場合、REVIEW_RESULT列に上書きされず正しい列（DETAIL_COL_LIST_CATEGORY_A + 12）に書き込まれる'
