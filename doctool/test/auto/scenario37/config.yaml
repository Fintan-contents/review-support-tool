- '検証: REVIEW_RESULT値が DETAIL_COL_LIST_CATEGORY_A + 12 の列に書き込まれること'
- template_assertions でテンプレートのカテゴリ列数を検証（Gold Master は VBA 修正後に Windows 環境で作成）
