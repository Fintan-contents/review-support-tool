viewpoint: "観点28: 削除対象ファイルが開いていない場合に削除対象なし通知（E09/E10）が表示される"
instructions:
  - "xlsx ファイルを一切配置しない（= 削除対象となる設計書が Excel で開かれていない状態）"
  - "コメント削除を実行 → E09（メモ削除対象のファイルがない）が発火することを検証"
  - "シート削除を実行 → E10（レビュー結果シート削除対象のファイルがない）が発火することを検証"
  - "いずれも処理は正常終了し、出力ファイルは生成されない"

# xlsx を一切配置しないため fileCount=0 となり E09/E10 が発火する
# file_expectations: [] は出力ファイルなしを意図的に示す（assertion_count=0 を許容）
setup:
  use_review_record: false
  use_summary: false

steps:
  - action: delete_comments
  - action: delete_sheets

expected_messages:
  - "E09"
  - "E10"

# 出力ファイルは生成されないため構造的アサーションなし（意図的）
file_expectations: []
