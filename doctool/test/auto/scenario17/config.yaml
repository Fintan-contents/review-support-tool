viewpoint: "観点65: レビュー記録一覧ファイルに指定シートが存在しない場合（E05）でエラーになり処理中断する"
instructions:
  - "レビュー記録サマリ_S17.xlsx はシート名不一致の最小構成ファイル（Sheet1 のみ）"
  - "REVIEW_LIST_SHEET に存在しないシート名 'レビュー記録一覧' を明示的に指定"
  - "VBA がファイルを開いた後、指定シートが存在しないことを検出して E05 で中断する"
  - "検証: E05 がログに記録され、設計書に結果シートが生成されないこと"

# review_list_file: "レビュー記録サマリ_S17.xlsx" が存在する（E04 回避）が、
# ファイル内に期待シートが存在しない（Sheet1 のみ）→ E05 発火
# REVIEW_LIST_SHEET に存在しないシート名を明示指定することで、テスト意図を明確化する
setup:
  use_summary: true
  review_list_file: "レビュー記録サマリ_S17.xlsx"
  named_ranges:
    REVIEW_LIST_SHEET: "レビュー記録一覧"

# VBA が REVIEW_LIST_FILEPATH 経由でファイルを開くため Python では開かない
# （COM disconnect 警告のノイズを防ぐため）
skip_open_files:
  - "レビュー記録サマリ.*\\.xlsx"

steps:
  - action: extract
    review_times: 1

expected_messages:
  - "E05"

file_expectations:
  - pattern: "システム機能設計書_サンプル_S17\\.xlsx"
    assert_no_sheets: ["レビュー結果1回目"]
