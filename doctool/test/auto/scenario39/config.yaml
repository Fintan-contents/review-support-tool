viewpoint: '観点79: エイリアスの形式が不正（英小文字1-2文字以外）の場合 E15 エラーが発生し処理が中断される'
instructions:
  - '形式不正なエイリアス（大文字 "A"、3文字 "abc"）を含むカテゴリ設定で実行'
  - '検証: E15 エラーメッセージが表示されて処理が中断されること'

setup:
  use_review_record: false
  use_summary: false

steps:
  - action: extract
    review_times: 1
    categories:
      - alias: a
        name: 分類001_a
      - alias: A
        name: 分類002_A_大文字不正
      - alias: abc
        name: 分類003_abc_3文字不正

expected_messages:
  - "E15"

file_expectations:
  - pattern: "システム機能設計書_サンプル_S39\\.xlsx"
    assert_no_sheets: ["レビュー結果1回目"]
