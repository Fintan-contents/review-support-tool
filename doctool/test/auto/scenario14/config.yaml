viewpoint: "観点62: 工程・レビュア・レビュイの反映値が未入力（E02）でエラーになり処理中断する"
instructions:
  - "REVIEW_LIST_PHASE='' かつ REVIEW_LIST_PHASE_SHEET='' に設定"
  - "E02 は use_summary の値に関係なく（Else ブロックで）発火する"
  - "E02 はファイルループ前に発火するため、C02・I01 は出現しない"
  - "検証: E02 がログに記録され、設計書に結果シートが生成されないこと"

# REVIEW_LIST_PHASE="": 固定値が空
# REVIEW_LIST_PHASE_SHEET="": 参照シートも空 → E02 条件成立
# use_summary=false: E01 発火を回避（E01 は use_summary=true かつ FILEPATH="" の場合）
setup:
  use_summary: false
  named_ranges:
    REVIEW_LIST_PHASE: ""
    REVIEW_LIST_PHASE_SHEET: ""
    REVIEW_LIST_PHASE_CELL: ""

steps:
  - action: extract
    review_times: 1

expected_messages:
  - "E02"

file_expectations:
  - pattern: "システム機能設計書_サンプル_S14\\.xlsx"
    assert_no_sheets: ["レビュー結果1回目"]
