viewpoint: "観点63: レビュー記録サマリ使用時にシート名未入力（E03）でエラーになり処理中断する"
instructions:
  - "use_summary=true + REVIEW_LIST_FILEPATH=非空（E01 回避）+ REVIEW_LIST_SHEET='' に設定"
  - "E03 は E04（ファイル存在チェック）より前に発火するため、ファイルは存在しなくてよい"
  - "検証: E03 がログに記録され、設計書に結果シートが生成されないこと"

# use_summary=true: サマリ使用（E03 発火条件）
# review_list_file: "placeholder.xlsx" → FILEPATH が非空文字列になるため E01 回避
#   （scenario_runner.py が work_dir/placeholder.xlsx の絶対パスを FILEPATH に設定する）
# REVIEW_LIST_SHEET="": シート名が空 → E03
setup:
  use_summary: true
  review_list_file: "placeholder.xlsx"
  named_ranges:
    REVIEW_LIST_SHEET: ""

steps:
  - action: extract
    review_times: 1

expected_messages:
  - "E03"

file_expectations:
  - pattern: "システム機能設計書_サンプル_S14\\.xlsx"
    assert_no_sheets: ["レビュー結果1回目"]
