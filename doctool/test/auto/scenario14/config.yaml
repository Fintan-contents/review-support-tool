viewpoint: "観点30〜45: カテゴリ増減後に増（9→6→12）でテンプレート列調整が正しく動作する"
instructions:
  - "Step1: 6カテゴリで抽出（テンプレート 9→6 列に削減）"
  - "Step2: レビュー結果シート削除"
  - "Step3: 12カテゴリで再抽出（テンプレート 6→12 列に拡張）"
  - "増減を経て最終的に増やしたケースで集計用ワーク列位置・数式・書式が正しいことを検証"
  - "template_assertions でカテゴリ列数（12）を自動検証"
  - "Gold Master 比較で抽出出力の内容を検証"

steps:
  # Step 1: 6カテゴリで抽出（テンプレートを 9→6 列に削減）
  - action: extract
    review_times: 1
    categories:
      - alias: "a"
        name: "01_要件漏れ"
      - alias: "b"
        name: "02_要件誤り"
      - alias: "c"
        name: "11_機能・仕様漏れ"
      - alias: "d"
        name: "12_機能・仕様誤り"
      - alias: "e"
        name: "21_設計・ドキュメント規約違反"
      - alias: "f"
        name: "22_記述誤り"

  # Step 2: レビュー結果シートを削除（次の抽出のためリセット）
  - action: delete_sheets

  # Step 3: 12カテゴリで再抽出（テンプレートを 6→12 列に拡張）
  - action: extract
    review_times: 1
    categories:
      - alias: "a"
        name: "01_要件漏れ"
      - alias: "b"
        name: "02_要件誤り"
      - alias: "c"
        name: "11_機能・仕様漏れ"
      - alias: "d"
        name: "12_機能・仕様誤り"
      - alias: "e"
        name: "21_設計・ドキュメント規約違反"
      - alias: "f"
        name: "22_記述誤り"
      - alias: "g"
        name: "91_疑問点、確認"
      - alias: "h"
        name: "92_改善要望"
      - alias: "i"
        name: "93_仕様変更"
      - alias: "j"
        name: "94_テスト項目漏れ"
      - alias: "k"
        name: "95_テスト漏れ"
      - alias: "l"
        name: "96_その他"

template_assertions:
  - sheet: "レビュー結果シートテンプレート"
    category_count: 12
    cell_formula_contains:
      - cell: "B9"
        contains: "$K15"

excluded_cells:
  - sheet: "レビュー結果1回目"
    cells: ["E4"]
