name: 配布用ZIPアーカイブ作成

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Goのセットアップ
        uses: actions/setup-go@v4
        with:
          go-version: "1.19"
          cache-dependency-path: getpr/go.sum

      - name: ビルドしてgetpr.exeを生成
        env:
          GOOS: windows
          GOARCH: amd64
        run: |
          cd getpr
          go build -o ../prtool/プルリクエストコメント抽出ツール/getpr.exe cmd/main.go

      - name: ZIPファイル作成準備
        run: |
          sudo apt-get install -y p7zip-full
          mkdir archive

      - name: prtool配布用ZIPファイル作成
        run: |
          cd prtool
          7za a -tzip ../archive/prtool.zip .

      - name: doctool配布用ZIPファイル作成
        run: |
          cd doctool
          7za a -tzip ../archive/doctool.zip .

      - name: ZIPファイルのアップロード
        uses: actions/upload-artifact@v4
        with:
          name: archive
          path: archive
          retention-days: 1
